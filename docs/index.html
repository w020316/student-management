<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --bg-elevated: #181a23;
            --bg-card: #1e2030;
            --fg: #e8e9ed;
            --fg-muted: #8b8fa3;
            --accent: #e8a838;
            --accent-hover: #f0bc5e;
            --accent-dim: rgba(232, 168, 56, 0.12);
            --danger: #e85454;
            --danger-hover: #f06e6e;
            --danger-dim: rgba(232, 84, 84, 0.12);
            --success: #38c97a;
            --success-dim: rgba(56, 201, 122, 0.12);
            --border: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(232, 168, 56, 0.3);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(232, 168, 56, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(56, 201, 122, 0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

        header { margin-bottom: 48px; animation: fadeDown 0.6s ease-out; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .header-top { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), #d4922e);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: #0f1117; font-weight: 700;
            box-shadow: 0 4px 16px rgba(232, 168, 56, 0.3);
        }
        header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--fg) 0%, var(--fg-muted) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: var(--fg-muted); font-size: 14px; margin-left: 60px; }

        .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; animation: fadeUp 0.6s ease-out 0.1s both; }
        .search-box { position: relative; flex: 1; max-width: 360px; }
        .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--fg-muted); width: 18px; height: 18px; }
        .search-box input {
            width: 100%; padding: 10px 14px 10px 42px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--fg); font-size: 14px; font-family: inherit; outline: none; transition: var(--transition);
        }
        .search-box input::placeholder { color: var(--fg-muted); }
        .search-box input:focus { border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-dim); }

        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border: none; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 500; font-family: inherit;
            cursor: pointer; transition: var(--transition); white-space: nowrap;
        }
        .btn svg { width: 16px; height: 16px; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #d4922e); color: #0f1117;
            box-shadow: 0 2px 12px rgba(232, 168, 56, 0.25);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-hover), var(--accent));
            box-shadow: 0 4px 20px rgba(232, 168, 56, 0.35); transform: translateY(-1px);
        }
        .btn-ghost { background: transparent; color: var(--fg-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--fg); border-color: rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.03); }
        .btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(232, 84, 84, 0.2); }
        .btn-danger:hover { background: rgba(232, 84, 84, 0.2); border-color: rgba(232, 84, 84, 0.35); }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-sm svg { width: 14px; height: 14px; }

        .table-wrapper {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden; animation: fadeUp 0.6s ease-out 0.2s both;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--bg-elevated); }
        th { padding: 14px 20px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-muted); border-bottom: 1px solid var(--border); }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid var(--border); transition: var(--transition); }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: var(--transition); }
        tbody tr:hover { background: rgba(255, 255, 255, 0.02); }

        .student-name { font-weight: 600; color: var(--fg); }
        .student-email { color: var(--fg-muted); font-size: 13px; }
        .student-age {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--accent-dim); color: var(--accent); padding: 2px 10px;
            border-radius: 20px; font-size: 13px; font-weight: 500;
        }
        .student-time { color: var(--fg-muted); font-size: 13px; }
        .actions { display: flex; gap: 8px; }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--fg-muted); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
        .empty-state p { font-size: 15px; margin-bottom: 4px; }
        .empty-state span { font-size: 13px; opacity: 0.6; }

        .pagination { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-top: 1px solid var(--border); }
        .pagination-info { font-size: 13px; color: var(--fg-muted); }
        .pagination-btns { display: flex; gap: 6px; }
        .page-btn {
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--fg-muted); font-size: 13px; font-family: inherit; cursor: pointer; transition: var(--transition);
        }
        .page-btn:hover:not(:disabled) { border-color: var(--border-accent); color: var(--accent); background: var(--accent-dim); }
        .page-btn.active { background: var(--accent); color: #0f1117; border-color: var(--accent); font-weight: 600; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            padding: 32px; width: 90%; max-width: 480px; box-shadow: var(--shadow);
            transform: scale(0.95) translateY(10px); transition: var(--transition);
        }
        .modal-overlay.active .modal { transform: scale(1) translateY(0); }
        .modal h2 { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; margin-bottom: 24px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--fg-muted); margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 14px; background: var(--bg-elevated);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--fg); font-size: 14px; font-family: inherit; outline: none; transition: var(--transition);
        }
        .form-group input::placeholder { color: var(--fg-muted); opacity: 0.5; }
        .form-group input:focus { border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .form-group input.error { border-color: rgba(232, 84, 84, 0.5); box-shadow: 0 0 0 3px var(--danger-dim); }
        .form-error { font-size: 12px; color: var(--danger); margin-top: 4px; display: none; }
        .form-error.show { display: block; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 28px; }

        .confirm-text { font-size: 15px; color: var(--fg-muted); line-height: 1.6; margin-bottom: 8px; }
        .confirm-name { color: var(--fg); font-weight: 600; }

        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            display: flex; align-items: center; gap: 10px; padding: 14px 20px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
            box-shadow: var(--shadow); font-size: 14px; animation: slideInRight 0.3s ease-out; min-width: 260px;
        }
        .toast.success { border-color: rgba(56, 201, 122, 0.3); }
        .toast.success svg { color: var(--success); }
        .toast.error { border-color: rgba(232, 84, 84, 0.3); }
        .toast.error svg { color: var(--danger); }
        .toast svg { width: 18px; height: 18px; flex-shrink: 0; }
        .toast.fade-out { opacity: 0; transform: translateX(20px); transition: var(--transition); }

        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .table-loading { text-align: center; padding: 60px; }

        .api-config-bar {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-elevated); border-bottom: 1px solid var(--border);
            padding: 10px 24px; display: flex; align-items: center; gap: 12px;
            animation: fadeDown 0.6s ease-out;
        }
        .api-config-bar label { font-size: 12px; color: var(--fg-muted); white-space: nowrap; }
        .api-config-bar input {
            flex: 1; max-width: 400px; padding: 6px 12px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--fg); font-size: 13px; font-family: inherit; outline: none; transition: var(--transition);
        }
        .api-config-bar input:focus { border-color: var(--border-accent); }
        .api-status { font-size: 12px; padding: 4px 10px; border-radius: 12px; white-space: nowrap; }
        .api-status.connected { background: var(--success-dim); color: var(--success); }
        .api-status.disconnected { background: var(--danger-dim); color: var(--danger); }

        @media (max-width: 768px) {
            .app { padding: 20px 16px; }
            header h1 { font-size: 24px; }
            .toolbar { flex-wrap: wrap; }
            .search-box { max-width: 100%; order: 2; flex-basis: 100%; }
            th, td { padding: 10px 12px; font-size: 13px; }
            .actions { flex-direction: column; gap: 4px; }
            .modal { padding: 24px; }
            .api-config-bar { flex-wrap: wrap; }
            .api-config-bar input { max-width: 100%; order: 2; flex-basis: 100%; }
        }
    </style>
</head>
<body>
    <div class="api-config-bar">
        <label>API 地址</label>
        <input type="text" id="apiBaseUrl" placeholder="http://localhost:8080" value="">
        <span class="api-status disconnected" id="apiStatus">未连接</span>
    </div>

    <div class="app">
        <header>
            <div class="header-top">
                <div class="logo-icon">S</div>
                <h1>学生信息管理系统</h1>
            </div>
            <p>Student Information Management System</p>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" placeholder="搜索学生姓名..." oninput="handleSearch()">
            </div>
            <button class="btn btn-primary" onclick="openAddModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                新增学生
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>ID</th><th>姓名</th><th>年龄</th><th>邮箱</th><th>创建时间</th><th>操作</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <p>暂无学生数据</p>
                <span>点击「新增学生」添加第一条记录</span>
            </div>
            <div id="tableLoading" class="table-loading" style="display:none;"><div class="loading-spinner"></div></div>
            <div id="pagination" class="pagination" style="display:none;">
                <div class="pagination-info" id="paginationInfo"></div>
                <div class="pagination-btns" id="paginationBtns"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <h2 id="formModalTitle">新增学生</h2>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="formName" placeholder="请输入姓名">
                <div class="form-error" id="nameError">姓名不能为空</div>
            </div>
            <div class="form-group">
                <label>年龄</label>
                <input type="number" id="formAge" placeholder="请输入年龄" min="1" max="150">
                <div class="form-error" id="ageError">请输入有效年龄（1-150）</div>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="formEmail" placeholder="请输入邮箱">
                <div class="form-error" id="emailError">请输入有效的邮箱地址</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeFormModal()">取消</button>
                <button class="btn btn-primary" id="formSubmitBtn" onclick="submitForm()">确认新增</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h2>确认删除</h2>
            <p class="confirm-text">确定要删除学生 <span class="confirm-name" id="confirmName"></span> 吗？此操作不可撤销。</p>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">确认删除</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const DEFAULT_API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? '' : 'http://localhost:8080';
        const apiInput = document.getElementById('apiBaseUrl');
        apiInput.value = localStorage.getItem('api_base_url') || DEFAULT_API;

        function getAPI() {
            let base = apiInput.value.trim().replace(/\/+$/, '');
            if (!base) base = '';
            localStorage.setItem('api_base_url', base);
            return base + '/api/students';
        }

        let currentPage = 1;
        let pageSize = 10;
        let searchTimer = null;
        let deleteTargetId = null;

        function checkConnection() {
            const statusEl = document.getElementById('apiStatus');
            fetch(getAPI() + '?page=1&pageSize=1', { method: 'HEAD' })
                .then(r => { statusEl.textContent = '已连接'; statusEl.className = 'api-status connected'; })
                .catch(() => { statusEl.textContent = '未连接'; statusEl.className = 'api-status disconnected'; });
        }
        apiInput.addEventListener('change', () => { currentPage = 1; fetchStudents(); checkConnection(); });

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success'
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            toast.innerHTML = icon + `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('fade-out'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function formatTime(dt) { return dt ? dt.replace('T', ' ').substring(0, 19) : '-'; }
        function escapeHtml(str) { return str ? str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : ''; }

        async function fetchStudents() {
            const name = document.getElementById('searchInput').value.trim();
            const loading = document.getElementById('tableLoading');
            const tbody = document.getElementById('tableBody');
            const empty = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');

            loading.style.display = 'block';
            tbody.innerHTML = '';
            empty.style.display = 'none';
            pagination.style.display = 'none';

            try {
                const params = new URLSearchParams({ name, page: currentPage, pageSize });
                const res = await fetch(`${getAPI()}?${params}`);
                const json = await res.json();

                if (json.code !== 200) { showToast(json.message || '请求失败', 'error'); loading.style.display = 'none'; empty.style.display = 'block'; return; }

                const { list, total, page, pageSize: ps } = json.data || {};
                loading.style.display = 'none';

                if (!list || list.length === 0) { empty.style.display = 'block'; return; }

                list.forEach((s, i) => {
                    const tr = document.createElement('tr');
                    tr.style.animation = `fadeUp 0.3s ease-out ${i * 0.04}s both`;
                    tr.innerHTML = `
                        <td style="color:var(--fg-muted)">${s.id}</td>
                        <td class="student-name">${escapeHtml(s.name)}</td>
                        <td><span class="student-age">${s.age}</span></td>
                        <td class="student-email">${escapeHtml(s.email || '-')}</td>
                        <td class="student-time">${formatTime(s.createTime)}</td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-ghost btn-sm" onclick="openEditModal(${s.id},'${escapeHtml(s.name)}',${s.age},'${escapeHtml(s.email || '')}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                    编辑
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="openConfirmModal(${s.id},'${escapeHtml(s.name)}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                    删除
                                </button>
                            </div>
                        </td>`;
                    tbody.appendChild(tr);
                });
                renderPagination(total, page, ps);
            } catch (e) { loading.style.display = 'none'; empty.style.display = 'block'; showToast('网络请求失败，请检查 API 地址是否正确', 'error'); }
        }

        function renderPagination(total, page, ps) {
            const totalPages = Math.ceil(total / ps);
            if (totalPages <= 1) return;
            const pagination = document.getElementById('pagination');
            const info = document.getElementById('paginationInfo');
            const btns = document.getElementById('paginationBtns');
            pagination.style.display = 'flex';
            info.textContent = `显示 ${(page-1)*ps+1}-${Math.min(page*ps,total)} 条，共 ${total} 条`;
            btns.innerHTML = '';

            const prevBtn = document.createElement('button'); prevBtn.className = 'page-btn';
            prevBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>';
            prevBtn.disabled = page <= 1; prevBtn.onclick = () => { currentPage=page-1; fetchStudents(); }; btns.appendChild(prevBtn);

            const maxVisible = 5;
            let startPage = Math.max(1, page - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

            if (startPage > 1) { btns.appendChild(createPageBtn(1, page)); if (startPage > 2) { const d=document.createElement('span'); d.textContent='...'; d.style.cssText='color:var(--fg-muted);padding:0 4px;font-size:12px;'; btns.appendChild(d); }}
            for (let i=startPage; i<=endPage; i++) btns.appendChild(createPageBtn(i, page));
            if (endPage < totalPages) { if (endPage<totalPages-1){const d=document.createElement('span');d.textContent='...';d.style.cssText='color:var(--fg-muted);padding:0 4px;font-size:12px;';btns.appendChild(d);} btns.appendChild(createPageBtn(totalPages, page)); }

            const nextBtn = document.createElement('button'); nextBtn.className = 'page-btn';
            nextBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
            nextBtn.disabled = page >= totalPages; nextBtn.onclick = () => { currentPage=page+1; fetchStudents(); }; btns.appendChild(nextBtn);
        }

        function createPageBtn(num, activePage) {
            const btn = document.createElement('button'); btn.className = 'page-btn'+(num===activePage?' active':'');
            btn.textContent = num; btn.onclick = () => { currentPage=num; fetchStudents(); }; return btn;
        }

        function handleSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentPage=1; fetchStudents(); }, 300); }

        function openAddModal() {
            document.getElementById('formModalTitle').textContent = '新增学生';
            document.getElementById('formSubmitBtn').textContent = '确认新增';
            document.getElementById('editId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formAge').value = '';
            document.getElementById('formEmail').value = '';
            clearFormErrors();
            document.getElementById('formModal').classList.add('active');
        }

        function openEditModal(id, name, age, email) {
            document.getElementById('formModalTitle').textContent = '编辑学生';
            document.getElementById('formSubmitBtn').textContent = '保存修改';
            document.getElementById('editId').value = id;
            document.getElementById('formName').value = name;
            document.getElementById('formAge').value = age;
            document.getElementById('formEmail').value = email;
            clearFormErrors();
            document.getElementById('formModal').classList.add('active');
        }

        function closeFormModal() { document.getElementById('formModal').classList.remove('active'); }

        function clearFormErrors() {
            document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
            document.querySelectorAll('.form-group input').forEach(e => e.classList.remove('error'));
        }

        function validateForm() {
            let valid = true;
            const name = document.getElementById('formName').value.trim();
            const age = document.getElementById('formAge').value;
            const email = document.getElementById('formEmail').value.trim();
            clearFormErrors();
            if (!name) { document.getElementById('nameError').classList.add('show'); document.getElementById('formName').classList.add('error'); valid=false; }
            if (!age || age<1 || age>150) { document.getElementById('ageError').classList.add('show'); document.getElementById('formAge').classList.add('error'); valid=false; }
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('emailError').classList.add('show'); document.getElementById('formEmail').classList.add('error'); valid=false; }
            return valid;
        }

        async function submitForm() {
            if (!validateForm()) return;
            const editId = document.getElementById('editId').value;
            const body = { name: document.getElementById('formName').value.trim(), age: parseInt(document.getElementById('formAge').value), email: document.getElementById('formEmail').value.trim() };
            try {
                let res;
                if (editId) res = await fetch(`${getAPI()}/${editId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
                else res = await fetch(getAPI(), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
                const json = await res.json();
                if (json.code === 200) { showToast(editId ? '修改成功' : '新增成功'); closeFormModal(); fetchStudents(); }
                else showToast(json.message || '操作失败', 'error');
            } catch (e) { showToast('网络请求失败', 'error'); }
        }

        function openConfirmModal(id, name) { deleteTargetId=id; document.getElementById('confirmName').textContent=name; document.getElementById('confirmModal').classList.add('active'); }
        function closeConfirmModal() { document.getElementById('confirmModal').classList.remove('active'); deleteTargetId=null; }

        async function confirmDelete() {
            if (!deleteTargetId) return;
            try {
                const res = await fetch(`${getAPI()}/${deleteTargetId}`, { method:'DELETE' });
                const json = await res.json();
                if (json.code === 200) { showToast('删除成功'); closeConfirmModal(); fetchStudents(); }
                else showToast(json.message || '删除失败', 'error');
            } catch (e) { showToast('网络请求失败', 'error'); }
        }

        document.getElementById('formModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeFormModal(); });
        document.getElementById('confirmModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeConfirmModal(); });
        document.addEventListener('keydown', e => { if (e.key==='Escape') { closeFormModal(); closeConfirmModal(); }});

        fetchStudents();
        checkConnection();
    </script>
</body>
</html>
